name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build
          mkdir -p ../internal/httpapi/webdist
          cp -r dist/* ../internal/httpapi/webdist/
      - name: Lint
        run: |
          test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
          go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...
